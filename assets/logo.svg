<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0067C0"/>
      <stop offset="1" stop-color="#4CC2FF"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E8F5FF"/>
    </linearGradient>
  </defs>

  <!-- Windows-style rounded tile -->
  <rect x="12" y="12" width="232" height="232" rx="52" fill="url(#tile)"/>

  <!-- three window panes -->
  <rect x="52" y="52" width="68" height="68" rx="13" fill="#FFFFFF" opacity="0.55"/>
  <rect x="132" y="52" width="68" height="68" rx="13" fill="#FFFFFF" opacity="0.55"/>
  <rect x="52" y="132" width="68" height="68" rx="13" fill="#FFFFFF" opacity="0.55"/>

  <!-- the fourth pane is a container, slightly larger: the app's promise -->
  <g>
    <rect x="126" y="126" width="86" height="86" rx="16" fill="url(#box)"/>
    <path d="M142 152h54M142 169h54M142 186h54" stroke="#0067C0" stroke-width="9" stroke-linecap="round"/>
  </g>
</svg>
